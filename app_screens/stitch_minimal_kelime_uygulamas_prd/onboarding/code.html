<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#acabab",
              "secondary": "#5e5e5e",
              "primary-container": "#3b3b3b",
              "surface-dim": "#dadada",
              "on-background": "#1a1c1c",
              "on-surface": "#1a1c1c",
              "on-secondary-container": "#1b1c1c",
              "on-primary-container": "#ffffff",
              "surface-variant": "#e2e2e2",
              "outline": "#777777",
              "secondary-fixed": "#c7c6c6",
              "on-secondary": "#ffffff",
              "surface-container": "#eeeeee",
              "tertiary-fixed": "#5d5f5f",
              "surface-container-low": "#f3f3f3",
              "on-primary-fixed-variant": "#e2e2e2",
              "inverse-on-surface": "#f1f1f1",
              "inverse-primary": "#c6c6c6",
              "primary-fixed": "#5e5e5e",
              "tertiary-fixed-dim": "#454747",
              "tertiary-container": "#737575",
              "background": "#f9f9f9",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "surface-bright": "#f9f9f9",
              "on-tertiary-container": "#ffffff",
              "error": "#ba1a1a",
              "on-primary-fixed": "#ffffff",
              "on-surface-variant": "#474747",
              "surface": "#f9f9f9",
              "outline-variant": "#c6c6c6",
              "surface-container-high": "#e8e8e8",
              "inverse-surface": "#2f3131",
              "tertiary": "#3a3c3c",
              "primary-fixed-dim": "#474747",
              "secondary-container": "#d5d4d4",
              "on-primary": "#e2e2e2",
              "on-secondary-fixed": "#1b1c1c",
              "primary": "#000000",
              "on-error": "#ffffff",
              "on-error-container": "#410002",
              "on-tertiary-fixed": "#ffffff",
              "surface-container-highest": "#e2e2e2",
              "surface-tint": "#5e5e5e",
              "on-secondary-fixed-variant": "#3b3b3c",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "on-tertiary": "#e2e2e2"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .dot-matrix {
            background-image: radial-gradient(circle, #c6c6c6 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.15;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Top Navigation Suppression: Not rendered for Transactional Onboarding flow per instructions -->
<main class="min-h-screen flex flex-col items-center justify-between px-8 py-16 md:py-24 relative overflow-hidden">
<!-- Background Texture -->
<div class="absolute inset-0 dot-matrix pointer-events-none"></div>
<!-- Progress Indicator (Simplified) -->
<div class="w-full max-w-md flex gap-2 mb-12 relative z-10">
<div class="h-1 flex-1 bg-outline-variant"></div>
<div class="h-1 flex-1 bg-outline-variant"></div>
<div class="h-1 flex-1 bg-primary"></div>
</div>
<!-- Content Area -->
<div class="w-full max-w-md flex flex-col items-start space-y-8 relative z-10">
<header class="space-y-2">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">Step 03 — Finalize</span>
<h1 class="font-headline text-5xl md:text-6xl font-bold tracking-tighter text-primary leading-none">
                    Ready to start?
                </h1>
</header>
<p class="font-body text-lg text-on-surface-variant leading-relaxed max-w-xs">
                Choose your daily goal: 5, 10, or 15 new words.
            </p>
<!-- Selection Grid -->
<div class="w-full grid grid-cols-1 gap-4 py-8">
<!-- Option 1 -->
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest border border-transparent hover:border-outline-variant transition-all duration-200 rounded-lg">
<div class="flex flex-col items-start">
<span class="font-headline text-4xl font-bold">5</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Words / Day</span>
</div>
<div class="w-6 h-6 rounded-full border border-outline-variant flex items-center justify-center group-hover:bg-surface-container"></div>
</button>
<!-- Option 2 (Active/Selected) -->
<button class="flex items-center justify-between p-6 bg-primary text-on-primary shadow-2xl transition-all duration-200 rounded-lg">
<div class="flex flex-col items-start">
<span class="font-headline text-4xl font-bold">10</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-primary/60">Words / Day</span>
</div>
<div class="w-6 h-6 rounded-full bg-on-primary flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Option 3 -->
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest border border-transparent hover:border-outline-variant transition-all duration-200 rounded-lg">
<div class="flex flex-col items-start">
<span class="font-headline text-4xl font-bold">15</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Words / Day</span>
</div>
<div class="w-6 h-6 rounded-full border border-outline-variant flex items-center justify-center group-hover:bg-surface-container"></div>
</button>
</div>
</div>
<!-- Footer Action -->
<footer class="w-full max-w-md mt-auto relative z-10 pt-12">
<button class="w-full bg-primary text-on-primary py-5 px-8 flex items-center justify-between group active:scale-95 transition-all duration-150 rounded-lg">
<span class="font-headline font-bold uppercase tracking-widest text-sm">Let's Begin</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="mt-8 flex justify-center">
<p class="font-label text-[10px] text-outline uppercase tracking-widest">
                    LEXICON © 2024 MACHINE-AGE
                </p>
</div>
</footer>
<!-- Decorative Element -->
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-surface-container rounded-full blur-[120px] opacity-50 pointer-events-none"></div>
</main>
<!-- BottomNavBar Suppression: Not rendered for onboarding screen as per Semantic Shell Mandate -->
</body></html>
