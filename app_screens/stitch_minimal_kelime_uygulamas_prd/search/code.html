<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .dot-matrix {
            background-image: radial-gradient(circle, #c6c6c6 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-neutral-50 dark:bg-neutral-950 flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-black dark:text-white active:scale-95 duration-100 hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors p-2 rounded">
<span class="material-symbols-outlined">menu</span>
</button>
<span class="text-xl font-black tracking-tighter text-black dark:text-white font-['Space_Grotesk'] tracking-tight font-bold uppercase">LEXICON</span>
</div>
<button class="text-black dark:text-white active:scale-95 duration-100 hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors p-2 rounded">
<span class="material-symbols-outlined">search</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-3xl mx-auto min-h-screen relative">
<!-- Background Texture -->
<div class="fixed inset-0 dot-matrix pointer-events-none"></div>
<!-- Search Input Section -->
<div class="mb-12 relative z-10">
<label class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-bold text-on-surface-variant mb-2 block">QUICK LOOKUP</label>
<div class="relative group">
<input autofocus="" class="w-full bg-surface-container-low border-b-2 border-primary focus:outline-none py-6 px-4 text-2xl font-headline font-bold tracking-tight placeholder:text-outline placeholder:font-light" placeholder="SEARCH WORD OR TURKISH" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary opacity-40 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-3xl">keyboard_return</span>
</div>
</div>
</div>
<!-- Results Section -->
<section class="relative z-10 space-y-4">
<div class="flex justify-between items-end border-b border-outline-variant/20 pb-2 mb-6">
<h2 class="font-headline text-sm font-bold uppercase tracking-widest text-on-surface-variant">Instant Matches</h2>
<span class="font-label text-[10px] text-outline">3 Results Found</span>
</div>
<!-- Result Items -->
<div class="space-y-2">
<!-- Result 1 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-lowest hover:bg-surface-container transition-colors group text-left">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-widest text-outline mb-1">001</span>
<h3 class="font-headline text-xl font-bold flex items-baseline gap-3">
                            village <span class="text-outline font-normal text-base">(köy)</span>
</h3>
</div>
<div class="flex items-center gap-4">
<span class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter">Common</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">arrow_forward_ios</span>
</div>
</button>
<!-- Result 2 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-lowest hover:bg-surface-container transition-colors group text-left">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-widest text-outline mb-1">002</span>
<h3 class="font-headline text-xl font-bold flex items-baseline gap-3">
                            villager <span class="text-outline font-normal text-base">(köylü)</span>
</h3>
</div>
<div class="flex items-center gap-4">
<span class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter">Noun</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">arrow_forward_ios</span>
</div>
</button>
<!-- Result 3 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-lowest hover:bg-surface-container transition-colors group text-left">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-widest text-outline mb-1">003</span>
<h3 class="font-headline text-xl font-bold flex items-baseline gap-3">
                            villa <span class="text-outline font-normal text-base">(villa)</span>
</h3>
</div>
<div class="flex items-center gap-4">
<span class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter">Direct</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">arrow_forward_ios</span>
</div>
</button>
</div>
</section>
<!-- Technical Metadata -->
<div class="mt-20 flex justify-between items-center opacity-40">
<div class="flex items-center gap-2">
<span class="w-2 h-2 bg-primary rounded-full"></span>
<span class="font-label text-[10px] uppercase tracking-[0.2em]">Engine Status: Ready</span>
</div>
<span class="font-label text-[10px] uppercase tracking-[0.2em]">v1.0.4-SEARCH</span>
</div>
</main>
<!-- BottomNavBar (SEARCH is active) -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-safe bg-white dark:bg-black border-t border-neutral-200 dark:border-neutral-800 z-50">
<a class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-500 px-4 py-1 hover:text-black dark:hover:text-white transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-bold mt-1">LIBRARY</span>
</a>
<a class="flex flex-col items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-sm px-4 py-1 transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-bold mt-1">SEARCH</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 dark:text-neutral-500 px-4 py-1 hover:text-black dark:hover:text-white transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined">bookmark</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-bold mt-1">SAVED</span>
</a>
</nav>
