<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LEXICON - Splash</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {

              "surface-dim": "#dadada",

              "on-primary-container": "#ffffff",
              "surface-variant": "#e2e2e2",
              "outline": "#777777",
              "secondary-fixed": "#c7c6c6",
              "on-secondary": "#ffffff",
              "surface-container": "#eeeeee",
              "tertiary-fixed": "#5d5f5f",
              "surface-container-low": "#f3f3f3",
              "on-primary-fixed-variant": "#e2e2e2",
              "inverse-on-surface": "#f1f1f1",
              "inverse-primary": "#c6c6c6",
              "primary-fixed": "#5e5e5e",
              "tertiary-fixed-dim": "#454747",
              "tertiary-container": "#737575",
              "background": "#f9f9f9",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "surface-bright": "#f9f9f9",
              "on-tertiary-container": "#ffffff",
              "error": "#ba1a1a",
              "on-primary-fixed": "#ffffff",
              "on-surface-variant": "#474747",
              "surface": "#f9f9f9",
              "outline-variant": "#c6c6c6",
              "surface-container-high": "#e8e8e8",
              "inverse-surface": "#2f3131",

              "on-error": "#ffffff",

              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},

        },

<style>
        .dot-matrix-bg {
            background-image: radial-gradient(circle, #c6c6c6 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.15;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Splash Screen Container -->
<!-- The navigation shells are suppressed as per the "Linear/Transactional" suppression rule for splash screens. -->
<main class="relative flex flex-col items-center justify-center min-h-screen overflow-hidden">
<!-- Dot Matrix Texture -->
<div class="absolute inset-0 dot-matrix-bg pointer-events-none"></div>
<!-- Central Identity Cluster -->
<div class="z-10 flex flex-col items-center space-y-8">
<!-- Technical Serial/Label -->
<div class="flex items-center space-x-2 text-on-surface-variant/60">
<span class="text-[10px] font-label tracking-[0.3em] uppercase">System.v1.0.4</span>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<span class="text-[10px] font-label tracking-[0.3em] uppercase">Minimal.Kernel</span>
</div>
<!-- Brand Anchor: LEXICON -->
<div class="relative">
<h1 class="text-7xl md:text-8xl font-headline font-bold tracking-tighter text-primary leading-none text-center">
                    LEXICON
                </h1>
<!-- Subtle technical underline decoration -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-12 h-[2px] bg-primary"></div>
</div>
<!-- Technical Motto -->
<div class="pt-4">
<p class="text-[11px] md:text-xs font-label tracking-[0.4em] text-on-surface-variant font-medium uppercase text-center">
                    learn slowly, remember longer
                </p>
</div>
</div>
<!-- Bottom Status/Loading Line -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-64 md:w-80 space-y-4">
<!-- Progress Line -->
<div class="h-[1px] w-full bg-surface-container-highest overflow-hidden">
<!-- Inner technical bar -->
<div class="h-full bg-primary w-1/3"></div>
</div>
<!-- Progress Detail -->
<div class="flex justify-between items-center w-full">
<span class="text-[9px] font-label tracking-widest text-on-surface-variant/50 uppercase">Loading modules</span>
<span class="text-[9px] font-label tracking-widest text-on-surface-variant/50 uppercase tabular-nums">34%</span>
</div>
</div>
<!-- Peripheral Decorative Icons (Machine Logic) -->
<div class="absolute top-12 left-12 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-sm" data-icon="grid_view">grid_view</span>
</div>
<div class="absolute top-12 right-12 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-sm" data-icon="terminal">terminal</span>
</div>
<div class="absolute bottom-12 right-12 opacity-20 hidden md:block">
<span class="material-symbols-outlined text-sm" data-icon="code">code</span>
</div>
</main>
<!-- Footer Copyright Branding (Subtle) -->
<footer class="fixed bottom-8 w-full text-center z-20">
<p class="text-[8px] font-label tracking-[0.5em] text-on-surface-variant/30 uppercase">
            © 2024 Industrial Monolith Design
        </p>
</footer>
</body></html>
