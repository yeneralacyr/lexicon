        .dot-matrix {
            background-image: radial-gradient(circle, #c6c6c6 1px, transparent 1px);
            background-size: 24px 24px;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f9] dark:bg-zinc-950 flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-black dark:text-white cursor-pointer transition-transform active:scale-95 duration-100">grid_view</span>
</div>
<h1 class="font-['Space_Grotesk'] tracking-[0.2em] font-bold uppercase text-xl text-black dark:text-white">LEXICON</h1>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-black dark:text-white cursor-pointer transition-transform active:scale-95 duration-100">settings</span>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-xl mx-auto w-full flex flex-col items-center">
<!-- Dot Matrix Background Subtle Hint -->
<div class="fixed inset-0 dot-matrix opacity-[0.15] pointer-events-none -z-10"></div>
<!-- Greeting Header -->
<div class="w-full mb-10 text-center">
<p class="font-label text-xs uppercase tracking-[0.15em] text-on-surface-variant font-medium mb-1">Status Report</p>
<h2 class="font-headline text-lg font-medium tracking-tight">Good morning. 12 words waiting for you today.</h2>
</div>
<!-- Centerpiece Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant/30 p-10 flex flex-col items-center justify-center relative shadow-[0_10px_30px_rgba(0,0,0,0.02)]">
<div class="absolute top-4 right-6 font-label text-[10px] tracking-widest text-outline uppercase">Module 04-A</div>
<div class="flex flex-col items-center mb-8">
<span class="font-headline text-[7rem] leading-none font-bold tracking-tighter text-primary">18</span>
<span class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mt-2">today's review</span>
</div>
<div class="flex flex-col items-center gap-4 w-full max-w-[240px]">
<div class="flex justify-between w-full font-label text-[11px] tracking-wide text-on-surface-variant">
<span>6 NEW WORDS</span>
<span>~4 MIN</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-[2px] bg-surface-container overflow-hidden">
<div class="h-full bg-primary w-1/3"></div>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="w-full mt-10 space-y-6">
<button class="w-full bg-primary text-on-primary-container h-16 font-label text-sm uppercase tracking-[0.2em] font-bold transition-all active:scale-[0.98] duration-100 flex items-center justify-center gap-2">
                Start Session
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<div class="flex justify-center gap-8">
<button class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant border-b border-transparent hover:border-outline transition-all pb-1">Review only</button>
<button class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant border-b border-transparent hover:border-outline transition-all pb-1">New words only</button>
</div>
</div>
<!-- Stats Grid -->
<div class="w-full grid grid-cols-2 gap-px bg-outline-variant/20 mt-16">
<div class="bg-surface py-6 px-2 flex flex-col items-center">
<span class="font-label text-[10px] uppercase tracking-[0.1em] text-outline mb-1">Streak</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline text-2xl font-bold tracking-tight">7 days</span>
</div>
</div>
<div class="bg-surface py-6 px-2 flex flex-col items-center">
<span class="font-label text-[10px] uppercase tracking-[0.1em] text-outline mb-1">Learned</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">verified</span>
<span class="font-headline text-2xl font-bold tracking-tight">248 words</span>
</div>
</div>
</div>
<!-- Industrial Footer Note -->
<div class="mt-12 text-center opacity-30">
<p class="font-label text-[9px] uppercase tracking-[0.4em]">Lexicon Machine-Age Interface v2.0.4</p>
</div>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-t border-zinc-200 dark:border-zinc-800 shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">

<a class="flex flex-col items-center justify-center text-black dark:text-white bg-zinc-100 dark:bg-zinc-900 rounded-lg px-3 py-1 transition-all duration-300 ease-in-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Today</span>
</a>

<span class="material-symbols-outlined">local_library</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Library</span>
</a>

<span class="material-symbols-outlined">search</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Search</span>
</a>

<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium mt-1">Profile</span>
</a>
